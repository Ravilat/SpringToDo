image:
  maven: latest
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=./.m2/repository"
stages:
  - build
  - test
  - package
  - deploy

build:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
      when: always
    - if: '$CI_COMMIT_TAG'
      when: never
  script:
    - 'mvn compile'
  cache:
    paths:
      - ./target
      - ./.m2

test:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
      when: always
    - if: '$CI_COMMIT_TAG'
      when: never
  script:
    - 'mvn test'
  cache:
    paths:
      - ./target
      - ./.m2

package:
  stage: package
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
      when: always
    - if: '$CI_COMMIT_TAG'
      when: never
  script:
    - 'mvn package -Dmaven.test.skip=true'
  artifacts:
    paths:
      - target/*.jar
    expire_in: 30 days
  cache:
    policy: pull
    paths:
      - ./target
      - ./.m2

docker_build:
  stage: deploy
  image: docker:latest
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  services:
    - docker:dind
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  script:
    - docker build -t $DOCKER_USERNAME/SpringToDo:$CI_COMMIT_SHORT_SHA .
    - docker push $DOCKER_USERNAME/SpringToDo:$CI_COMMIT_SHORT_SHA